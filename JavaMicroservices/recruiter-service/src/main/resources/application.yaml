spring:
  application:
    name: auth-service

  mail:
    host: smtp.gmail.com
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          ssl:
            trust: smtp.gmail.com

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 30000
      max-lifetime: 1200000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
    show-sql: true
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations:
      - classpath:db.migration
    schemas: public
    table: flyway_schema_history
    validate-on-migrate: true

server:
  port: 8081
  servlet:
    context-path: /recruiter/v1

jwt:
  accessExpiration: 900000
  secret: ${JWT_SECRET}

app:
  mail-from: ${MAIL_FROM:${MAIL_USERNAME:no-reply@talenta.local}}

logging:
  level:
    org.springframework: INFO
    com.talenta: DEBUG
